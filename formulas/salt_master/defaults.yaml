salt_master:
  interface: 0.0.0.0
  publish_port: 4505
  ret_port: 4506
  auto_accept: false
  project_root: /srv/salt
  pillar_root: /srv/pillar
  fileserver:
    mode: roots
  gitfs:
    provider: gitcli
    update_interval: 180
    project_repo:
      enabled: false
      url: https://git.example.local/infra/salt-project.git
      base: main
      ssl_verify: true
      unsafe_ssl_no_verify: false
      proxy: null
      auth:
        method: none
        username: null
        password: null
        token: null
  network_config_file: /etc/salt/master.d/10-network.conf
  auto_accept_config_file: /etc/salt/master.d/20-auto-accept.conf
  project_roots_config_file: /etc/salt/master.d/30-project-roots.conf
  logrotate_config_file: /etc/logrotate.d/salt-master
  logrotate:
    manage: false
    enabled: false
    log_file: /var/log/salt/master
    frequency: daily
    rotate: 14
    maxsize: 100M
  service:
    name: salt-master
    enabled: true
    running: true
    restart_on_change: false

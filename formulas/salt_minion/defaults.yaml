salt_minion:
  masters:
    - salt
  failover:
    retry_dns: 0
    master_alive_interval: 30
    master_failback: true
    master_failback_interval: 30
    random_master: false
  master_config_file: /etc/salt/minion.d/10-master.conf
  schedule_config_file: /etc/salt/minion.d/30-schedule.conf
  logrotate_config_file: /etc/logrotate.d/salt-minion
  schedule:
    self_management:
      manage: false
      enabled: false
      minutes: 15
      splay: 300
      run_on_start: false
  logrotate:
    manage: false
    enabled: false
    log_file: /var/log/salt/minion
    frequency: daily
    rotate: 14
    maxsize: 100M
  service:
    name: salt-minion
    enabled: true
    running: true
    restart_on_change: false
